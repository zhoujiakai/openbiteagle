app:
    APP_NAME: Biteagle API
    APP_VERSION: 0.1.0
    DEBUG: true
    HOST: 0.0.0.0
    PORT: 8000

database:
    DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/biteagle
    DATABASE_SCHEMA: biteagle

security:
    SECRET_KEY: your-secret-key-here-change-in-production
    ALGORITHM: HS256
    ACCESS_TOKEN_EXPIRE_MINUTES: 30

cors:
    CORS_ORIGINS:
        - http://localhost:3000

deepseek:
    DEEPSEEK_API_KEY: your-deepseek-api-key
    DEEPSEEK_BASE_URL: https://api.deepseek.com
    DEEPSEEK_MODEL: deepseek-chat

openai:
    OPENAI_API_KEY: your-openai-api-key
    OPENAI_MODEL: gpt-4o-mini

jina:
    JINA_API_KEY: your-jina-api-key
    JINA_EMBEDDING_MODEL: jina-embeddings-v3
    JINA_API_URL: https://api.jina.ai/v1/embeddings
    JINA_EMBEDDING_DIM: 1024
    JINA_BATCH_SIZE: 8
    JINA_TIMEOUT: 30.0
    CHUNK_SIZE: 500
    CHUNK_OVERLAP: 100

langsmith:
    LANGCHAIN_TRACING_V2: "true"
    LANGCHAIN_API_KEY: lsv2_your_langsmith_api_key_here
    LANGCHAIN_PROJECT: biteagle

cmc:
    CMC_API_KEY: your-cmc-api-key

rabbitmq:
    RABBITMQ_URL: amqp://admin:admin@localhost:5672
    RABBITMQ_QUEUE: biteagle_analysis
    RABBITMQ_DLQ: biteagle_analysis_dlq

redis:
    REDIS_URL: redis://localhost:6380

worker:
    MAX_RETRIES: 3
    CONCURRENCY: 5
    RETRY_BASE_DELAY: 5
    TASK_TTL: 3600

oss:
    OSS_ACCESS_KEY_ID: your-oss-access-key-id
    OSS_ACCESS_KEY_SECRET: your-oss-access-key-secret
    OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
    OSS_BUCKET_NAME: your-oss-bucket-name

neo4j:
    NEO4J_URI: bolt://localhost:7687
    NEO4J_USER: neo4j
    NEO4J_PASSWORD: biteagle_password
    NEO4J_MAX_CONNECTION_LIFETIME: 3600
    NEO4J_MAX_CONNECTION_POOL_SIZE: 50
    NEO4J_CONNECTION_ACQUISITION_TIMEOUT: 60

rootdata:
    ROOTDATA_API_KEY: your-rootdata-api-key
    ROOTDATA_BASE_URL: https://api.rootdata.com/open
    ROOTDATA_LANGUAGE: en
    ROOTDATA_TIMEOUT: 15.0
